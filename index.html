<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; }
        canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; padding: 20px; background: #e74c3c; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="btn">START CLAW VR</button>
    <video id="input_video" playsinline muted></video>
    <div class="view-container">
        <div class="view" id="view_l"></div>
        <div class="view" id="view_r"></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        let scene, camera, rendererL, rendererR;
        const claws = [];

        // 1. Setup 3D Scene
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / 2 / window.innerHeight, 0.1, 1000);
            
            // Create 10 claws (5 per hand)
            const geometry = new THREE.ConeGeometry(0.05, 0.3, 8);
            const material = new THREE.MeshBasicMaterial({color: 0xff0000}); // Red Claws
            
            for(let i=0; i<10; i++) {
                const claw = new THREE.Mesh(geometry, material);
                scene.add(claw);
                claws.push(claw);
            }

            rendererL = new THREE.WebGLRenderer({alpha: true});
            rendererR = new THREE.WebGLRenderer({alpha: true});
            rendererL.setSize(window.innerWidth/2, window.innerHeight);
            rendererR.setSize(window.innerWidth/2, window.innerHeight);
            document.getElementById('view_l').appendChild(rendererL.domElement);
            document.getElementById('view_r').appendChild(rendererR.domElement);
        }

        // 2. MediaPipe Logic
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0 });

        hands.onResults((results) => {
            // Hide all claws initially
            claws.forEach(c => c.visible = false);

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((hand, handIdx) => {
                    // Finger tips are landmarks 4, 8, 12, 16, 20
                    const tips = [4, 8, 12, 16, 20];
                    tips.forEach((tipIdx, i) => {
                        const clawIdx = (handIdx * 5) + i;
                        const lm = hand[tipIdx];
                        
                        // Convert MediaPipe (0 to 1) to Three.js coordinates
                        claws[clawIdx].position.x = (lm.x - 0.5) * 5;
                        claws[clawIdx].position.y = -(lm.y - 0.5) * 5;
                        claws[clawIdx].position.z = -lm.z * 5;
                        claws[clawIdx].visible = true;
                    });
                });
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        async function start() {
            btn.style.display = 'none';
            init3D();
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
        }

        btn.onclick = start;
    </script>
</body>
</html>
