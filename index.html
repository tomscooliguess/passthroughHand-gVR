<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #333; }
        canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; padding: 20px 40px; background: #00ffcc; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <button id="btn">START PERFECT OVERLAY</button>
    <video id="input_video" playsinline muted></video>
    <div class="view-container">
        <div class="view"><canvas id="can_l"></canvas></div>
        <div class="view"><canvas id="can_r"></canvas></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const canvases = [document.getElementById('can_l'), document.getElementById('can_r')];
        const ctxs = canvases.map(c => c.getContext('2d'));

        const pairs = [
            [0,1],[1,2],[2,3],[3,4], // Thumb
            [0,5],[5,6],[6,7],[7,8], // Index
            [0,9],[9,10],[10,11],[11,12], // Middle
            [0,13],[13,14],[14,15],[15,16], // Ring
            [0,17],[17,18],[18,19],[19,20], // Pinky
            [5,9],[9,13],[13,17],[0,17] // Palm
        ];

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            ctxs.forEach((ctx, i) => {
                const can = canvases[i];
                if (can.width !== video.videoWidth) {
                    can.width = video.videoWidth; 
                    can.height = video.videoHeight;
                }

                // 1. Draw the camera feed
                ctx.save();
                ctx.clearRect(0, 0, can.width, can.height);
                ctx.drawImage(results.image, 0, 0, can.width, can.height);

                // 2. Draw the skeletal lines
                if (results.multiHandLandmarks) {
                    results.multiHandLandmarks.forEach((landmarks, hIdx) => {
                        const isRight = results.multiHandedness[hIdx].label === 'Right';
                        ctx.strokeStyle = isRight ? '#ff00ff' : '#00ffff';
                        ctx.lineWidth = 8;
                        ctx.lineCap = 'round';
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = ctx.strokeStyle;

                        pairs.forEach(([s, e]) => {
                            const start = landmarks[s];
                            const end = landmarks[e];
                            
                            ctx.beginPath();
                            ctx.moveTo(start.x * can.width, start.y * can.height);
                            ctx.lineTo(end.x * can.width, end.y * can.height);
                            ctx.stroke();
                        });

                        // Draw joints
                        ctx.fillStyle = "#ffffff";
                        landmarks.forEach(p => {
                            ctx.beginPath();
                            ctx.arc(p.x * can.width, p.y * can.height, 4, 0, Math.PI * 2);
                            ctx.fill();
                        });
                    });
                }
                ctx.restore();
            });
        });

        async function start() {
            document.getElementById('btn').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 1280, height: 720 }
            });
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
        }

        document.getElementById('btn').onclick = start;
    </script>
</body>
</html>
