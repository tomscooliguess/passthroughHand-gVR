<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; }
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; padding: 20px; background: #2ecc71; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <button id="btn">FIX HANDS & START</button>
    <video id="input_video" playsinline muted></video>
    <div class="view-container">
        <div class="view" id="view_l"><canvas class="bg-canvas" id="bg_l"></canvas></div>
        <div class="view" id="view_r"><canvas class="bg-canvas" id="bg_r"></canvas></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        let leftHand, rightHand;
        let clock = new THREE.Clock();

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            camera.position.z = 1.5;

            const light = new THREE.AmbientLight(0xffffff, 1);
            scene.add(light);

            const loader = new THREE.GLTFLoader();
            loader.load('Rigged_Hand_blend.glb', (gltf) => {
                // Setup Left Hand
                leftHand = gltf.scene;
                // Force reset scale/rotation to prevent distortion
                leftHand.scale.set(0.5, 0.5, 0.5); 
                leftHand.rotation.set(0, 0, 0);
                scene.add(leftHand);

                // Setup Right Hand (cloned)
                rightHand = leftHand.clone();
                scene.add(rightHand);
                
                btn.style.display = 'block';
            });

            rendererL = new THREE.WebGLRenderer({ alpha: true });
            rendererR = new THREE.WebGLRenderer({ alpha: true });
            rendererL.setSize(window.innerWidth / 2, window.innerHeight);
            rendererR.setSize(window.innerWidth / 2, window.innerHeight);
            document.getElementById('view_l').appendChild(rendererL.domElement);
            document.getElementById('view_r').appendChild(rendererR.domElement);
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0 });

        hands.onResults((results) => {
            // Background update
            bgCanvases.forEach((canvas, i) => {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                }
                bgCtxs[i].drawImage(results.image, 0, 0, canvas.width, canvas.height);
            });

            if (leftHand) leftHand.visible = false;
            if (rightHand) rightHand.visible = false;

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const label = results.multiHandedness[index].label;
                    const model = (label === 'Left') ? leftHand : rightHand;
                    
                    if (model) {
                        model.visible = true;
                        const wrist = landmarks[0];
                        // Improved mapping to stop freezing
                        const targetX = (wrist.x - 0.5) * 3;
                        const targetY = -(wrist.y - 0.5) * 2;
                        
                        // Use lerp (smoothing) to prevent "frozen" feeling
                        model.position.x += (targetX - model.position.x) * 0.3;
                        model.position.y += (targetY - model.position.y) * 0.3;
                        model.position.z = -wrist.z * 2;
                    }
                });
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        async function start() {
            btn.style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
        }

        init3D();
        btn.onclick = start;
    </script>
</body>
</html>
