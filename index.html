<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; border-right: 1px solid #333; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 999; 
               padding: 20px 40px; font-size: 1.2rem; background: #2ecc71; color: white; border: none; border-radius: 10px; }
        #error-log { position: fixed; bottom: 0; width: 100%; background: rgba(255,0,0,0.7); font-size: 10px; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <button id="btn">TAP TO START VR</button>
    <video id="input_video" playsinline webkit-playsinline muted></video>
    <div class="view-container">
        <div class="view"><canvas id="canvas_left"></canvas></div>
        <div class="view"><canvas id="canvas_right"></canvas></div>
    </div>

    <script>
        // Emergency Error Logger
        const log = (msg) => { document.getElementById('error-log').innerText += msg + "\n"; };
        window.onerror = (m, u, l) => log(`Error: ${m} at line ${l}`);

        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        const canvases = [document.getElementById('canvas_left'), document.getElementById('canvas_right')];
        const ctxs = canvases.map(c => c.getContext('2d'));

        let hands;
        try {
            hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            
           hands.onResults((results) => {
    canvases.forEach((canvas, i) => {
        const ctx = ctxs[i];
        
        // 1. Draw the background video frame first
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        // 2. Check if ANY hands were found
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            // 3. LOOP through every hand found (will do 2 if maxNumHands is 2)
            for (const landmarks of results.multiHandLandmarks) {
                drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {
                    color: '#00FF00', 
                    lineWidth: 3
                });
                drawLandmarks(ctx, landmarks, {
                    color: '#FF0000', 
                    lineWidth: 1
                });
            }
        }
        ctx.restore();
    });
});
            log("MediaPipe Ready");
        } catch(e) { log("MediaPipe Init Fail: " + e); }

        btn.onclick = async () => {
            log("Button clicked...");
            btn.style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 }
                });
                video.srcObject = stream;
                await video.play();
                log("Video playing...");

                const cameraLoop = async () => {
                    await hands.send({image: video});
                    requestAnimationFrame(cameraLoop);
                };
                cameraLoop();
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } catch (err) {
                log("Camera Fail: " + err);
                btn.style.display = 'block';
            }
        };
    </script>
</body>
</html>
