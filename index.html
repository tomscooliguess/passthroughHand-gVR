<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #222; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 10; }
        video { display: none; }
        #status { position: fixed; top: 10px; width: 100%; text-align: center; color: #0f0; z-index: 2000; pointer-events: none; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            background: #000; color: #00ffcc; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="status">INITIATING...</div>
    <div id="overlay"><h1>[ TAP TO ENTER ]</h1></div>
    <video id="input_video" playsinline muted></video>
    <div class="view-container">
        <div class="view" id="view_l"></div>
        <div class="view" id="view_r"></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const status = document.getElementById('status');
        let scene, camera, rendererL, rendererR;
        let leftHand, rightHand, world;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.01, 1000);
            camera.position.set(0, 0, 0.5); // Camera starts slightly back

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.PointLight(0xffffff, 1);
            light.position.set(0, 2, 1);
            scene.add(light);

            const loader = new THREE.GLTFLoader();

            // Load World: Pushed further down and away so it doesn't hide hands
            loader.load('liminal.glb', (gltf) => {
                world = gltf.scene;
                world.position.set(0, -2, -5); 
                world.scale.set(0.5, 0.5, 0.5);
                scene.add(world);
                status.innerText = "ROOM LOADED. WAITING FOR HANDS...";
            });

            // Load Hands
            loader.load('hand_for_vr.glb', (gltf) => {
                leftHand = gltf.scene;
                leftHand.scale.set(0.2, 0.2, 0.2); // Scaled up slightly to be visible
                
                // Add a glow so we can see them in the dark room
                leftHand.traverse(n => { if(n.isMesh) n.material.emissive = new THREE.Color(0x00ffff); });
                
                scene.add(leftHand);
                rightHand = leftHand.clone();
                rightHand.scale.x *= -1;
                scene.add(rightHand);
                
                leftHand.visible = rightHand.visible = false;
            });

            rendererL = new THREE.WebGLRenderer({ antialias: true });
            rendererR = new THREE.WebGLRenderer({ antialias: true });
            [rendererL, rendererR].forEach((r, i) => {
                r.setSize(window.innerWidth / 2, window.innerHeight);
                document.getElementById(i === 0 ? 'view_l' : 'view_r').appendChild(r.domElement).className = "fg-canvas";
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            if (leftHand) leftHand.visible = false;
            if (rightHand) rightHand.visible = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                status.innerText = "HANDS DETECTED";
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const isRight = results.multiHandedness[index].label === 'Right';
                    const model = isRight ? rightHand : leftHand;
                    
                    if (model) {
                        model.visible = true;
                        const wrist = landmarks[0];
                        // Map coordinates to be directly in front of the camera (0.5 to 1.5 units away)
                        model.position.set(
                            (wrist.x - 0.5) * 2, 
                            -(wrist.y - 0.5) * 1.5, 
                            -wrist.z * 2 - 0.8 
                        );
                    }
                });
            } else {
                status.innerText = "SHOW HANDS TO CAMERA";
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        async function start() {
            document.getElementById('overlay').style.display = 'none';
            // Use environment camera so you can hold the phone like a viewfinder
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
        }

        init3D();
        document.getElementById('overlay').onclick = start;
    </script>
</body>
</html>
