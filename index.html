<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Precision VR Hand Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #222; }
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; padding: 25px 50px; background: #2ecc71; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <button id="btn">START VR</button>
    <video id="input_video" playsinline webkit-playsinline muted></video>
    <div class="view-container">
        <div class="view"><canvas class="bg-canvas" id="bg_l"></canvas></div>
        <div class="view"><canvas class="bg-canvas" id="bg_r"></canvas></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        let leftHand, rightHand;

        function init3D() {
            scene = new THREE.Scene();
            // Camera at Z=2 to give a wide viewing frustum
            camera = new THREE.PerspectiveCamera(70, (window.innerWidth / 2) / window.innerHeight, 0.01, 100);
            camera.position.set(0, 0, 2); 

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));

            const loader = new THREE.GLTFLoader();
            loader.load('hand_for_vr.glb', (gltf) => {
                const baseModel = gltf.scene;
                
                // CRITICAL: Re-center the model so its "Wrist" is the pivot point
                const box = new THREE.Box3().setFromObject(baseModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                // This shifts the mesh so the wrist (bottom of the model) is at 0,0,0
                baseModel.position.set(-center.x, -center.y + (size.y / 2), -center.z);
                
                // Wrap in a group for easier tracking
                leftHand = new THREE.Group();
                leftHand.add(baseModel);
                leftHand.scale.set(0.08, 0.08, 0.08); // Smaller base scale
                scene.add(leftHand);

                rightHand = leftHand.clone();
                rightHand.scale.x *= -1; // Flip for right hand
                scene.add(rightHand);
                
                leftHand.visible = rightHand.visible = false;
                document.getElementById('btn').style.display = 'block';
            });

            rendererL = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            rendererR = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            [rendererL, rendererR].forEach((r, i) => {
                r.setSize(window.innerWidth / 2, window.innerHeight);
                document.querySelectorAll('.view')[i].appendChild(r.domElement).className = "fg-canvas";
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            bgCtxs.forEach((ctx, i) => {
                if (bgCanvases[i].width !== video.videoWidth) {
                    bgCanvases[i].width = video.videoWidth; bgCanvases[i].height = video.videoHeight;
                }
                ctx.drawImage(results.image, 0, 0, bgCanvases[i].width, bgCanvases[i].height);
            });

            if (leftHand) leftHand.visible = false;
            if (rightHand) rightHand.visible = false;

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const label = results.multiHandedness[index].label;
                    const model = (label === 'Left') ? leftHand : rightHand;
                    
                    if (model) {
                        model.visible = true;
                        const wrist = landmarks[0];
                        const middleKnuckle = landmarks[9];

                        // COORDINATE MAPPING
                        // Adjusting these multipliers to match the 2-unit camera distance
                        const posX = (wrist.x - 0.5) * 3.5;
                        const posY = -(wrist.y - 0.5) * 2.5;
                        const posZ = -wrist.z * 5; // Depth tracking

                        // Smooth movement (Lerp)
                        model.position.x += (posX - model.position.x) * 0.4;
                        model.position.y += (posY - model.position.y) * 0.4;
                        model.position.z = posZ;

                        // TRACKING ROTATION
                        // Calculate tilt based on wrist-to-knuckle vector
                        const dx = middleKnuckle.x - wrist.x;
                        const dy = middleKnuckle.y - wrist.y;
                        const rotationZ = Math.atan2(dy, dx) + (label === 'Left' ? -Math.PI/2 : Math.PI/2);
                        model.rotation.z = rotationZ;
                    }
                });
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        async function start() {
            document.getElementById('btn').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 1280, height: 720 }
            });
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
        }

        init3D();
        document.getElementById('btn').onclick = start;
    </script>
</body>
</html>
