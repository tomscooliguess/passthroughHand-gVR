<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        /* Split-screen layout */
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; border-right: 1px solid #222; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        video { display: none; } /* Raw camera hidden */
        
        /* Start Button */
        #btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 1000; padding: 25px 50px; font-size: 1.5rem; font-weight: bold;
            background: #2ecc71; color: white; border: none; border-radius: 50px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); cursor: pointer;
        }
        #error-log { position: fixed; bottom: 0; width: 100%; background: rgba(255,0,0,0.5); font-size: 10px; z-index: 1001; pointer-events: none; }
    </style>
</head>
<body>
    <div id="error-log"></div>
    <button id="btn">START VR VIEW</button>
    <video id="input_video" playsinline webkit-playsinline muted></video>
    
    <div class="view-container">
        <div class="view"><canvas id="canvas_left"></canvas></div>
        <div class="view"><canvas id="canvas_right"></canvas></div>
    </div>

    <script>
        const log = (msg) => { document.getElementById('error-log').innerText += msg + "\n"; };
        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        const canvases = [document.getElementById('canvas_left'), document.getElementById('canvas_right')];
        const ctxs = canvases.map(c => c.getContext('2d'));

        // 1. Initialize MediaPipe Hands
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({
            maxNumHands: 2,           // Detects both hands
            modelComplexity: 0,      // 0 = Faster (best for mobile), 1 = Accurate
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // 2. Handle the AI Results
        hands.onResults((results) => {
            canvases.forEach((canvas, i) => {
                // Ensure canvas matches high-quality video resolution
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                
                const ctx = ctxs[i];
                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw the video frame background
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

                // Draw Hand Skeletons
                if (results.multiHandLandmarks) {
                    for (const landmarks of results.multiHandLandmarks) {
                        // Drawing only connectors (green lines), no red dots
                        drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {
                            color: '#00FF00', 
                            lineWidth: 4 
                        });
                    }
                }
                ctx.restore();
            });
        });

        // 3. Start Camera and Fullscreen
        async function startApp() {
            btn.style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 }, // Quality up
                        height: { ideal: 720 }
                    }
                });
                video.srcObject = stream;
                await video.play();

                // High-performance animation loop
                const processFrames = async () => {
                    await hands.send({image: video});
                    requestAnimationFrame(processFrames);
                };
                processFrames();

                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            } catch (err) {
                alert("Camera Error: " + err);
                btn.style.display = 'block';
            }
        }

        btn.onclick = startApp;
    </script>
</body>
</html>
