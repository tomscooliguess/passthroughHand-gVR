<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #111; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 10; }
        video { display: none; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            background: #000; color: #00ffcc; font-family: monospace; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay"><h1>[ CLICK TO ENTER LIMINAL SPACE ]</h1></div>
    <video id="input_video" playsinline muted></video>
    <div class="view-container">
        <div class="view" id="view_l"></div>
        <div class="view" id="view_r"></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        let scene, camera, rendererL, rendererR;
        let leftHand, rightHand;
        let world;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            
            // Lighting for the room
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            const loader = new THREE.GLTFLoader();

            // 1. Load the Environment
            loader.load('liminal.glb', (gltf) => {
                world = gltf.scene;
                world.position.set(0, -1.5, -2); // Position the floor below the camera
                scene.add(world);
            });

            // 2. Load and Prepare Hands
            loader.load('hand_for_vr.glb', (gltf) => {
                leftHand = gltf.scene;
                leftHand.scale.set(0.1, 0.1, 0.1);
                scene.add(leftHand);

                rightHand = leftHand.clone();
                rightHand.scale.x *= -1;
                scene.add(rightHand);
                
                leftHand.visible = rightHand.visible = false;
            });

            rendererL = new THREE.WebGLRenderer({ antialias: true });
            rendererR = new THREE.WebGLRenderer({ antialias: true });
            [rendererL, rendererR].forEach((r, i) => {
                r.setSize(window.innerWidth / 2, window.innerHeight);
                document.getElementById(i === 0 ? 'view_l' : 'view_r').appendChild(r.domElement).className = "fg-canvas";
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            if (leftHand) leftHand.visible = false;
            if (rightHand) rightHand.visible = false;

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const isRight = results.multiHandedness[index].label === 'Right';
                    const model = isRight ? rightHand : leftHand;
                    
                    if (model) {
                        model.visible = true;
                        const wrist = landmarks[0];
                        const indexBase = landmarks[5];
                        
                        // Map tracking to 3D Space (adjusting for the room's scale)
                        model.position.set(
                            (wrist.x - 0.5) * 3, 
                            -(wrist.y - 0.5) * 2, 
                            -wrist.z * 4 - 0.5 // Push hands slightly away from face
                        );

                        // Simple Rotation
                        const angle = Math.atan2(indexBase.y - wrist.y, indexBase.x - wrist.x);
                        model.rotation.z = angle + (isRight ? 1.6 : -1.6);
                    }
                });
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        async function start() {
            document.getElementById('overlay').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        init3D();
        document.getElementById('overlay').onclick = start;
    </script>
</body>
</html>
