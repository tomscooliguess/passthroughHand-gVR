<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #222; }
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        video { display: none; }
        #btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 1000; padding: 25px 50px; background: #2ecc71; color: white; 
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="btn">START VR HANDS</button>
    <video id="input_video" playsinline webkit-playsinline muted></video>
    
    <div class="view-container">
        <div class="view" id="view_l"><canvas class="bg-canvas" id="bg_l"></canvas></div>
        <div class="view" id="view_r"><canvas class="bg-canvas" id="bg_r"></canvas></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        let leftHand, rightHand;
function init3D() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 2); 

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(0, 2, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    const loader = new THREE.GLTFLoader();
    loader.load('hand_for_vr.glb', (gltf) => {
        leftHand = gltf.scene;
        
        leftHand.scale.set(0.05, 0.05, 0.05); 
        
       
        const box = new THREE.Box3().setFromObject(leftHand);
        const center = box.getCenter(new THREE.Vector3());
        leftHand.position.sub(center); 
        
        scene.add(leftHand);

        rightHand = leftHand.clone();
        rightHand.scale.x *= -1;
        scene.add(rightHand);
        
        leftHand.visible = rightHand.visible = false;
    });

    rendererL = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    rendererR = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    
    [rendererL, rendererR].forEach((r, i) => {
        r.setSize(window.innerWidth / 2, window.innerHeight);
        r.setPixelRatio(window.devicePixelRatio);
        r.domElement.className = "fg-canvas";
        document.getElementsByClassName('view')[i].appendChild(r.domElement);
    });
}
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1 });

        hands.onResults((results) => {
            bgCanvases.forEach((canvas, i) => {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                }
                bgCtxs[i].drawImage(results.image, 0, 0, canvas.width, canvas.height);
            });

            if (leftHand) leftHand.visible = false;
            if (rightHand) rightHand.visible = false;

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const isRight = results.multiHandedness[index].label === 'Right';
                    const model = isRight ? rightHand : leftHand;
                    
                    if (model) {
                        model.visible = true;
                        const wrist = landmarks[0];
                    
                    const targetX = (wrist.x - 0.5) * 3; 
                    const targetY = -(wrist.y - 0.5) * 2; 
                        
                    model.position.x += (targetX - model.position.x) * 0.4;
                    model.position.y += (targetY - model.position.y) * 0.4;
                    model.position.z = -wrist.z * 5; 
                        const indexFinger = landmarks[5];
                        model.rotation.z = Math.atan2(indexFinger.y - wrist.y, indexFinger.x - wrist.x) + (isRight ? 1.5 : -1.5);
                    }
                });
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        async function start() {
            btn.style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 1280, height: 720 }
            });
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        init3D();
        btn.onclick = start;
    </script>
</body>
</html>
