<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #333; }
        /* The Canvas for 2D Camera Feed */
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        /* The Canvas for 3D Claws */
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; padding: 25px; background: #e74c3c; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <button id="btn">START VR</button>
    <video id="input_video" playsinline muted></video>
    
    <div class="view-container">
        <div class="view" id="view_l">
            <canvas class="bg-canvas" id="bg_l"></canvas>
        </div>
        <div class="view" id="view_r">
            <canvas class="bg-canvas" id="bg_r"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        const claws = [];

        function init3D() {
            scene = new THREE.Scene();
            // Adjusted FOV for VR phone perspective
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            camera.position.z = 2;

            // Claw Geometry: Long, sharp cones
            const geometry = new THREE.ConeGeometry(0.04, 0.4, 8);
            const material = new THREE.MeshBasicMaterial({color: 0x00ff00}); // Neon Green Claws
            
            for(let i=0; i<10; i++) {
                const claw = new THREE.Mesh(geometry, material);
                claw.rotation.x = Math.PI; // Point them outward
                scene.add(claw);
                claws.push(claw);
            }

            rendererL = new THREE.WebGLRenderer({alpha: true, antialias: true});
            rendererR = new THREE.WebGLRenderer({alpha: true, antialias: true});
            rendererL.setSize(window.innerWidth/2, window.innerHeight);
            rendererR.setSize(window.innerWidth/2, window.innerHeight);
            
            rendererL.domElement.className = "fg-canvas";
            rendererR.domElement.className = "fg-canvas";
            
            document.getElementById('view_l').appendChild(rendererL.domElement);
            document.getElementById('view_r').appendChild(rendererR.domElement);
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.6 });

        hands.onResults((results) => {
    // 1. Draw Background
    bgCanvases.forEach((canvas, i) => {
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        }
        bgCtxs[i].drawImage(results.image, 0, 0, canvas.width, canvas.height);
    });

    // 2. Position and Rotate Claws
    claws.forEach(c => c.visible = false);
    
    if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((hand, handIdx) => {
            // Finger pairs: [knuckle, tip]
            const fingerPairs = [
                [3, 4],   // Thumb
                [7, 8],   // Index
                [11, 12], // Middle
                [15, 16], // Ring
                [19, 20]  // Pinky
            ];

            fingerPairs.forEach((pair, i) => {
                const clawIdx = (handIdx * 5) + i;
                const knuckle = hand[pair[0]];
                const tip = hand[pair[1]];
                const claw = claws[clawIdx];

                // Position the claw at the fingertip
                // We use a slightly different multiplier to match the 720p perspective
                claw.position.x = (tip.x - 0.5) * 4;
                claw.position.y = -(tip.y - 0.5) * 3;
                claw.position.z = -tip.z * 5;

                // ROTATION LOGIC: Point the cone away from the knuckle
                const dx = tip.x - knuckle.x;
                const dy = tip.y - knuckle.y;
                
                // Calculate the angle of the finger
                const angle = Math.atan2(dy, dx);
                claw.rotation.z = -angle - Math.PI/2; 
                
                claw.visible = true;
            });
        });
    }
    rendererL.render(scene, camera);
    rendererR.render(scene, camera);
});
        async function start() {
            btn.style.display = 'none';
            init3D();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 }
                });
                video.srcObject = stream;
                await video.play();
                
                const loop = async () => {
                    await hands.send({image: video});
                    requestAnimationFrame(loop);
                };
                loop();
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } catch (err) {
                alert("Error: " + err);
            }
        }

        btn.onclick = start;
    </script>
</body>
</html>
