<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #333; }
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 10; pointer-events: none; }
        video { display: none; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); color: white; text-align: center;
        }
    </style>
</head>
<body>
    <div id="overlay"><h1>TAP ANYWHERE TO ENTER ISLAND</h1></div>
    
    <video id="input_video" playsinline muted></video>
    <div class="view-container">
        <div class="view"><canvas class="bg-canvas" id="bg_l"></canvas></div>
        <div class="view"><canvas class="bg-canvas" id="bg_r"></canvas></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const overlay = document.getElementById('overlay');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        let pointer;
        let islands = [];

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            camera.position.z = 2;

            // Ambient Light
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            // Create Floating UI Elements (Islands)
            const geo = new THREE.IcosahedronGeometry(0.2, 0);
            for(let i = 0; i < 4; i++) {
                const mat = new THREE.MeshPhongMaterial({ 
                    color: 0x00d2ff, 
                    emissive: 0x0055ff, 
                    shininess: 100,
                    flatShading: true 
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(Math.cos(i) * 0.8, Math.sin(i) * 0.5, 0.5);
                scene.add(mesh);
                islands.push(mesh);
            }

            // Index Finger Pointer
            pointer = new THREE.Mesh(
                new THREE.SphereGeometry(0.04, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            scene.add(pointer);

            rendererL = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            rendererR = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            [rendererL, rendererR].forEach((r, i) => {
                r.setSize(window.innerWidth / 2, window.innerHeight);
                document.querySelectorAll('.view')[i].appendChild(r.domElement).className = "fg-canvas";
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            bgCtxs.forEach((ctx, i) => {
                bgCanvases[i].width = video.videoWidth; bgCanvases[i].height = video.videoHeight;
                ctx.drawImage(results.image, 0, 0);
            });

            pointer.visible = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                pointer.visible = true;
                const tip = landmarks[8]; // Index Tip
                
                // Map tracking to 3D space
                pointer.position.set((tip.x - 0.5) * 4, -(tip.y - 0.5) * 3, -tip.z * 2);

                // Interaction: Rotate islands when "touched"
                islands.forEach(isl => {
                    const dist = pointer.position.distanceTo(isl.position);
                    if(dist < 0.25) {
                        isl.rotation.y += 0.1;
                        isl.scale.set(1.2, 1.2, 1.2);
                    } else {
                        isl.scale.set(1, 1, 1);
                    }
                });
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        async function start() {
            overlay.style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        init3D();
        // Start on ANY tap
        window.addEventListener('click', start, {once: true});
        window.addEventListener('touchstart', start, {once: true});
    </script>
</body>
</html>
