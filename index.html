<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Rigged Hand VR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #333; }
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        video { display: none; }
        #btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 1000; padding: 25px 50px; font-size: 1.2rem; 
            background: #2ecc71; color: white; border: none; border-radius: 50px; display: none;
        }
        #status { position: fixed; top: 20px; width: 100%; text-align: center; color: white; z-index: 1001; }
    </style>
</head>
<body>
    <div id="status">Loading Hand Models...</div>
    <button id="btn">START RIGGED VR</button>
    <video id="input_video" playsinline webkit-playsinline muted></video>
    
    <div class="view-container">
        <div class="view" id="view_l"><canvas class="bg-canvas" id="bg_l"></canvas></div>
        <div class="view" id="view_r"><canvas class="bg-canvas" id="bg_r"></canvas></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        let leftHandModel, rightHandModel;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 2);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(light);

            const loader = new THREE.GLTFLoader();
            // PATH: Change this to the exact name of the file in your GitHub
            loader.load('Rigged_Hand_blend.glb', (gltf) => {
                const model = gltf.scene;
                
                // Separate the hands (assuming the GLB has nodes named hand.L and hand.R)
                leftHandModel = model.clone();
                rightHandModel = model.clone();
                
                // We'll hide them until a hand is detected
                leftHandModel.visible = false;
                rightHandModel.visible = false;
                
                scene.add(leftHandModel);
                scene.add(rightHandModel);

                status.innerHTML = "Hands Ready!";
                btn.style.display = 'block';
            }, undefined, (error) => {
                status.innerHTML = "Error loading GLB: " + error;
            });

            rendererL = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            rendererR = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            rendererL.setSize(window.innerWidth / 2, window.innerHeight);
            rendererR.setSize(window.innerWidth / 2, window.innerHeight);
            rendererL.domElement.className = "fg-canvas";
            rendererR.domElement.className = "fg-canvas";
            document.getElementById('view_l').appendChild(rendererL.domElement);
            document.getElementById('view_r').appendChild(rendererR.domElement);
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            // Background camera feed
            bgCanvases.forEach((canvas, i) => {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                }
                bgCtxs[i].drawImage(results.image, 0, 0, canvas.width, canvas.height);
            });

            if (leftHandModel) leftHandModel.visible = false;
            if (rightHandModel) rightHandModel.visible = false;

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const isRight = results.multiHandedness[index].label === 'Right';
                    const model = isRight ? rightHandModel : leftHandModel;
                    
                    if (model) {
                        model.visible = true;
                        const wrist = landmarks[0];
                        
                        // Map 3D Model position to your real wrist
                        model.position.x = (wrist.x - 0.5) * 4;
                        model.position.y = -(wrist.y - 0.5) * 3;
                        model.position.z = -wrist.z * 5;

                        // Basic rotation to face the camera
                        // For a full "fingers bending" effect, you would map each bone here.
                    }
                });
            }
            if(rendererL) rendererL.render(scene, camera);
            if(rendererR) rendererR.render(scene, camera);
        });

        async function start() {
            btn.style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 1280, height: 720 }
                });
                video.srcObject = stream;
                await video.play();
                const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
                loop();
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } catch (err) { alert("Camera Error: " + err); }
        }

        window.onload = init3D;
        btn.onclick = start;
    </script>
</body>
</html>
