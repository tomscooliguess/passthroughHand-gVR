<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #333; }
        /* The Canvas for 2D Camera Feed */
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        /* The Canvas for 3D Claws */
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; padding: 25px; background: #e74c3c; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <button id="btn">START VR</button>
    <video id="input_video" playsinline muted></video>
    
    <div class="view-container">
        <div class="view" id="view_l">
            <canvas class="bg-canvas" id="bg_l"></canvas>
        </div>
        <div class="view" id="view_r">
            <canvas class="bg-canvas" id="bg_r"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        const claws = [];

        // 1. Updated 3D Setup with Bones
function init3D() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
    camera.position.z = 2;

    // We'll create a "pool" of 3D parts
    const boneMat = new THREE.MeshBasicMaterial({color: 0x00ff00}); // Neon Green Bones
    const boneGeo = new THREE.CylinderGeometry(0.015, 0.015, 1, 8);
    const tipGeo = new THREE.ConeGeometry(0.02, 0.4, 12);

    // Create 40 parts per hand to cover all joints (2 hands * 20 parts)
    claws = []; 
    for(let i=0; i<40; i++) {
        const part = new THREE.Mesh(i % 5 === 0 && i !== 0 ? tipGeo : boneGeo, boneMat);
        part.visible = false;
        scene.add(part);
        claws.push(part);
    }

    rendererL = new THREE.WebGLRenderer({alpha: true, antialias: true});
    rendererR = new THREE.WebGLRenderer({alpha: true, antialias: true});
    rendererL.setSize(window.innerWidth/2, window.innerHeight);
    rendererR.setSize(window.innerWidth/2, window.innerHeight);
    
    rendererL.domElement.className = "fg-canvas";
    rendererR.domElement.className = "fg-canvas";
    
    document.getElementById('view_l').appendChild(rendererL.domElement);
    document.getElementById('view_r').appendChild(rendererR.domElement);
}

// 2. The Logic to "Skin" the Hand
hands.onResults((results) => {
    // Draw Camera background
    bgCanvases.forEach((canvas, i) => {
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        }
        bgCtxs[i].drawImage(results.image, 0, 0, canvas.width, canvas.height);
    });

    claws.forEach(c => c.visible = false);

    if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((hand, handIdx) => {
            // Define the connections for a full hand overlay
            const connections = [
                [0,1], [1,2], [2,3], [3,4],       // Thumb
                [0,5], [5,6], [6,7], [7,8],       // Index
                [0,9], [9,10], [10,11], [11,12],  // Middle
                [0,13], [13,14], [14,15], [15,16],// Ring
                [0,17], [17,18], [18,19], [19,20] // Pinky
            ];

            connections.forEach((join, i) => {
                const partIdx = (handIdx * 20) + i;
                const p1 = hand[join[0]];
                const p2 = hand[join[1]];
                const mesh = claws[partIdx];

                // Convert to 3D Space
                const start = new THREE.Vector3((p1.x - 0.5) * 4, -(p1.y - 0.5) * 3, -p1.z * 5);
                const end = new THREE.Vector3((p2.x - 0.5) * 4, -(p2.y - 0.5) * 3, -p2.z * 5);

                // Position the "bone" in the middle of the two points
                mesh.position.copy(start.clone().lerp(end, 0.5));
                
                // Stretch and rotate the bone to connect the joints
                mesh.scale.set(1, start.distanceTo(end), 1);
                mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), end.clone().sub(start).normalize());
                
                mesh.visible = true;
            });
        });
    }
    rendererL.render(scene, camera);
    rendererR.render(scene, camera);
});
        async function start() {
            btn.style.display = 'none';
            init3D();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 }
                });
                video.srcObject = stream;
                await video.play();
                
                const loop = async () => {
                    await hands.send({image: video});
                    requestAnimationFrame(loop);
                };
                loop();
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } catch (err) {
                alert("Error: " + err);
            }
        }

        btn.onclick = start;
    </script>
</body>
</html>
