<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Hand Overlay VR</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #333; }
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        video { display: none; }
        #btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 1000; padding: 25px 50px; font-size: 1.2rem; 
            background: #2ecc71; color: white; border: none; border-radius: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; display: none;
        }
        #status { position: fixed; top: 20px; width: 100%; text-align: center; font-size: 14px; z-index: 1001; color: #aaa; }
    </style>
</head>
<body>
    <div id="status">Loading AI & 3D Engine...</div>
    <button id="btn">START VR OVERLAY</button>
    <video id="input_video" playsinline webkit-playsinline muted></video>
    
    <div class="view-container">
        <div class="view" id="view_l"><canvas class="bg-canvas" id="bg_l"></canvas></div>
        <div class="view" id="view_r"><canvas class="bg-canvas" id="bg_r"></canvas></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        let meshes = [];

        // 1. Setup 3D Scene
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.5;

            const boneMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            const boneGeo = new THREE.CylinderGeometry(0.015, 0.015, 1, 8);
            const tipGeo = new THREE.ConeGeometry(0.025, 0.4, 12);

            // Create 42 parts (21 per hand)
            for(let i=0; i<42; i++) {
                const isTip = [4, 8, 12, 16, 20].includes(i % 21);
                const mesh = new THREE.Mesh(isTip ? tipGeo : boneGeo, boneMat);
                mesh.visible = false;
                scene.add(mesh);
                meshes.push(mesh);
            }

            rendererL = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            rendererR = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            rendererL.setSize(window.innerWidth / 2, window.innerHeight);
            rendererR.setSize(window.innerWidth / 2, window.innerHeight);
            rendererL.domElement.className = "fg-canvas";
            rendererR.domElement.className = "fg-canvas";
            
            document.getElementById('view_l').appendChild(rendererL.domElement);
            document.getElementById('view_r').appendChild(rendererR.domElement);
        }

        // 2. Setup Hands
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            // Draw Camera
            bgCanvases.forEach((canvas, i) => {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                }
                bgCtxs[i].drawImage(results.image, 0, 0, canvas.width, canvas.height);
            });

            // Update 3D Overlay
            meshes.forEach(m => m.visible = false);
            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((hand, handIdx) => {
                    const connections = [
                        [0,1],[1,2],[2,3],[3,4], [0,5],[5,6],[6,7],[7,8],
                        [0,9],[9,10],[10,11],[11,12], [0,13],[13,14],[14,15],[15,16],
                        [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
                    ];

                    connections.forEach((conn, i) => {
                        const mIdx = (handIdx * 21) + i;
                        if (mIdx >= meshes.length) return;
                        
                        const p1 = hand[conn[0]];
                        const p2 = hand[conn[1]];
                        const mesh = meshes[mIdx];

                        const start = new THREE.Vector3((p1.x - 0.5) * 4, -(p1.y - 0.5) * 3, -p1.z * 4);
                        const end = new THREE.Vector3((p2.x - 0.5) * 4, -(p2.y - 0.5) * 3, -p2.z * 4);

                        mesh.position.copy(start.clone().lerp(end, 0.5));
                        mesh.scale.set(1, start.distanceTo(end), 1);
                        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), end.clone().sub(start).normalize());
                        mesh.visible = true;
                    });
                });
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        // 3. Start App
        async function start() {
            btn.style.display = 'none';
            status.innerHTML = "Initializing Camera...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 }
                });
                video.srcObject = stream;
                await video.play();
                init3D();
                
                const loop = async () => {
                    await hands.send({image: video});
                    requestAnimationFrame(loop);
                };
                loop();
                status.style.display = 'none';
                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            } catch (err) {
                alert("Error: " + err);
                status.innerHTML = "Error: " + err.message;
            }
        }

        // Only show button once scripts are loaded
        window.onload = () => {
            status.innerHTML = "Engine Ready.";
            btn.style.display = 'block';
        };
        btn.onclick = start;
    </script>
</body>
</html>
