<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; border-right: 1px solid #222; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 10; }
        video { display: none; }
        #status { position: fixed; top: 10px; width: 100%; text-align: center; color: #0f0; z-index: 2000; background: rgba(0,0,0,0.5); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; color: #00ffcc; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status">WAITING...</div>
    <div id="overlay"><h1>[ CLICK TO RE-CENTER & START ]</h1></div>
    <video id="input_video" playsinline muted></video>
    <div class="view-container">
        <div class="view" id="view_l"></div>
        <div class="view" id="view_r"></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const status = document.getElementById('status');
        let scene, camera, rendererL, rendererR;
        let leftHand, rightHand, debugCube;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.01, 1000);
            camera.position.set(0, 0, 0); // Camera at origin

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const light = new THREE.PointLight(0xffffff, 2);
            light.position.set(0, 2, 1);
            scene.add(light);

            // Debug Cube - If you see this, tracking is working
            debugCube = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
            scene.add(debugCube);

            const loader = new THREE.GLTFLoader();

            // Load World - Scale it down and move it so it's a floor
            loader.load('liminal.glb', (gltf) => {
                const world = gltf.scene;
                world.position.set(0, -1.6, -3); 
                world.scale.set(0.01, 0.01, 0.01); // Shrink it in case it's huge
                scene.add(world);
                status.innerText = "WORLD READY";
            });

            // Load Hands with specific visibility settings
            loader.load('hand_for_vr.glb', (gltf) => {
                leftHand = gltf.scene;
                leftHand.scale.set(0.5, 0.5, 0.5); // Large enough to see
                scene.add(leftHand);

                rightHand = leftHand.clone();
                rightHand.scale.x *= -1;
                scene.add(rightHand);
                
                leftHand.visible = rightHand.visible = false;
            });

            rendererL = new THREE.WebGLRenderer({ antialias: true });
            rendererR = new THREE.WebGLRenderer({ antialias: true });
            [rendererL, rendererR].forEach((r, i) => {
                r.setSize(window.innerWidth / 2, window.innerHeight);
                document.getElementById(i === 0 ? 'view_l' : 'view_r').appendChild(r.domElement).className = "fg-canvas";
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            if (leftHand) leftHand.visible = false;
            if (rightHand) rightHand.visible = false;
            debugCube.visible = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const isRight = results.multiHandedness[index].label === 'Right';
                    const model = isRight ? rightHand : leftHand;
                    
                    if (model) {
                        const wrist = landmarks[0];
                        
                        // NEW TRACKING MATH
                        // Places hands exactly 0.5 to 1.0 units in front of the camera
                        const x = (wrist.x - 0.5) * 2;
                        const y = -(wrist.y - 0.5) * 1.5;
                        const z = -0.5 - (wrist.z * 2);

                        model.position.set(x, y, z);
                        model.visible = true;

                        // Move debug cube to the first detected hand
                        if(index === 0) {
                            debugCube.position.set(x, y + 0.2, z);
                            debugCube.visible = true;
                        }

                        status.innerText = "HANDS VISIBLE. Z-DEPTH: " + z.toFixed(2);
                    }
                });
            } else {
                status.innerText = "SEARCHING FOR HANDS...";
            }
            rendererL.render(scene, camera);
            rendererR.render(scene, camera);
        });

        async function start() {
            document.getElementById('overlay').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
        }

        init3D();
        document.getElementById('overlay').onclick = start;
    </script>
</body>
</html>
