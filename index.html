<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }

        .view { width: 50%; height: 100%; border-right: 1px solid #333; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 999; 
               padding: 20px 40px; font-size: 1.2rem; background: #2ecc71; color: white; border: none; border-radius: 10px; }
        #error-log { position: fixed; bottom: 0; width: 100%; background: rgba(255,0,0,0.7); font-size: 10px; pointer-events: none; z-index: 1000; }
    </style>
</head>

        <div class="view"><canvas id="canvas_right"></canvas></div>
    </div>
