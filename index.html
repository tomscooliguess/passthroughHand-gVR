<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .view-container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50%; height: 100%; position: relative; overflow: hidden; }
        .bg-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .fg-canvas { width: 100%; height: 100%; position: absolute; z-index: 2; pointer-events: none; }
        video { display: none; }
        #btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; padding: 25px; background: #2ecc71; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        #status { position: fixed; bottom: 20px; width: 100%; text-align: center; color: white; z-index: 1001; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="status">Checking File...</div>
    <button id="btn">START VR</button>
    <video id="input_video" playsinline muted></video>
    <div class="view-container">
        <div class="view" id="view_l"><canvas class="bg-canvas" id="bg_l"></canvas></div>
        <div class="view" id="view_r"><canvas class="bg-canvas" id="bg_r"></canvas></div>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const status = document.getElementById('status');
        const bgCanvases = [document.getElementById('bg_l'), document.getElementById('bg_r')];
        const bgCtxs = bgCanvases.map(c => c.getContext('2d'));
        
        let scene, camera, rendererL, rendererR;
        let customModel = null;
        let fallbackMeshes = [];

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.01, 100);
            camera.position.z = 1;

            const light = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(light);

            // FALLBACK: Create simple neon bones just in case GLB fails
            const boneGeo = new THREE.CylinderGeometry(0.005, 0.005, 1);
            const boneMat = new THREE.MeshBasicMaterial({color: 0x00ff00});
            for(let i=0; i<42; i++){
                const m = new THREE.Mesh(boneGeo, boneMat);
                m.visible = false; scene.add(m); fallbackMeshes.push(m);
            }

            // LOAD CUSTOM MODEL
            const loader = new THREE.GLTFLoader();
            loader.load('Rigged_Hand_blend.glb', (gltf) => {
                customModel = gltf.scene;
                customModel.scale.set(0.1, 0.1, 0.1); 
                scene.add(customModel);
                status.innerHTML = "Custom Model Active";
            }, undefined, (e) => {
                status.innerHTML = "GLB Load Failed - Using Fallback";
                console.error(e);
            });

            rendererL = new THREE.WebGLRenderer({ alpha: true });
            rendererR = new THREE.WebGLRenderer({ alpha: true });
            [rendererL, rendererR].forEach((r, i) => {
                r.setSize(window.innerWidth/2, window.innerHeight);
                r.domElement.className = "fg-canvas";
                document.getElementsByClassName('view')[i].appendChild(r.domElement);
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0 });

     hands.onResults((results) => {
    // 1. Draw Background
    bgCanvases.forEach((canvas, i) => {
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        }
        bgCtxs[i].drawImage(results.image, 0, 0, canvas.width, canvas.height);
    });

    // 2. Reset visibility every frame
    if (customModel) {
        // Find the specific hand sub-objects inside your GLB
        const meshL = customModel.getObjectByName('hand.L');
        const meshR = customModel.getObjectByName('hand.R');
        const armature = customModel.getObjectByName('Armature');

        // Hide everything by default
        if(meshL) meshL.visible = false;
        if(meshR) meshR.visible = false;
        customModel.visible = false;

        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks, index) => {
                customModel.visible = true;
                const isRightHand = results.multiHandedness[index].label === 'Right';
                
                // Only show the side that matches the detected hand
                if (isRightHand && meshR) meshR.visible = true;
                if (!isRightHand && meshL) meshL.visible = true;

                // Move the whole armature to the detected wrist position
                const wrist = landmarks[0];
                customModel.position.x = (wrist.x - 0.5) * 3.5;
                customModel.position.y = -(wrist.y - 0.5) * 2.5;
                customModel.position.z = -wrist.z * 4;
            });
        }
    }

    rendererL.render(scene, camera);
    rendererR.render(scene, camera);
});
        async function start() {
            document.getElementById('btn').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            video.srcObject = stream;
            await video.play();
            const loop = async () => { await hands.send({image: video}); requestAnimationFrame(loop); };
            loop();
        }

        init3D();
        document.getElementById('btn').onclick = start;
    </script>
</body>
</html>
